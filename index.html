<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Evaluation Test</title>
    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background-color: #E0F6FF;
            background-image: url('background.jpg');
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #1a1a1a;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px 20px 20px 15px;
            background-color: rgba(255,255,255,0.95);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.12);
        }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .question { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
    <h1>Medical Evaluation Question and Answer Test</h1>
    <form action="https://formspree.io/f/mnjgpopn" method="POST">
        <input type="hidden" name="_subject" value="Medical Evaluation Submission">
        <div class="question">
            <label for="email">Your Email (required for submission):</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="question">
            <label for="symptom">Question 1: What is your symptom?</label>
            <input type="text" id="symptom" name="symptom" required>
        </div>
        <div class="question">
            <label for="severity">Question 2: How severe is it? (Describe)</label>
            <textarea id="severity" name="severity" rows="4" required></textarea>
        </div>
        <div class="question">
            <label for="time">Question 3: How long has it lasted? </label>
            <textarea id="time" name="time" rows="4" required></textarea>
        </div>
        <div class="question">
            <label>Question 4: Placeholder Question</label><br>
            <input type="radio" id="opt1" name="q4" value="Option 1"> Option 1<br>
            <input type="radio" id="opt2" name="q4" value="Option 2"> Option 2<br>
            <input type="radio" id="opt3" name="q4" value="Option 3"> Option 3<br>
            <input type="radio" id="opt4" name="q4" value="Option 4"> Option 4<br>
            <input type="radio" id="other" name="q4" value="other"> Other: <input type="text" id="multiple choice 1: other" name="otherText" disabled>
        </div>
        
        <p><strong>Note:</strong> answer with N/A if not applicable.</p>
        <div class="question">
            <label for="medical_history">Medical history FRQ - provide any past medical conditions, surgeries, allergies, and chronic diseases.</label>
            <textarea id="medical_history" name="medical_history" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="medications">Provide primary care provider with a complete list of medications and supplements you are currently taking.</label>
            <textarea id="medications" name="medications" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="dietary">Provide any specific dietary restrictions or modifications such as diabetes.</label>
            <textarea id="dietary" name="dietary" rows="4"></textarea>
        </div>
        
        <button type="submit">Submit Test</button>
    </form>
    <script>
        document.getElementById('other').addEventListener('change', function() {
            document.getElementById('multiple choice 1: text').disabled = !this.checked;
        });
    </script>
    </div>
</body>
</html></content>
