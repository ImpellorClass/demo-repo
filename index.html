<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Evaluation Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .question { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Medical Evaluation Question and Answer Test</h1>
    <div class="question">
        <p>Question 1: What is your symptom?</p>
        <button onclick="alert('Option A selected')">Option A</button>
        <button onclick="alert('Option B selected')">Option B</button>
    </div>
    <div class="question">
        <p>Question 2: How severe is it?</p>
        <button onclick="alert('Mild')">Mild</button>
        <button onclick="alert('Moderate')">Moderate</button>
        <button onclick="alert('Severe')">Severe</button>
    </div>
    <button onclick="submitTest()">Submit Test</button>
    <script>
        function submitTest() {
            alert('Test submitted!');
        }
    </script>
</body>
