<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Evaluation Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #E0F6FF; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 20px 20px 15px; background-color: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .question { margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 8px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
    <h1>Medical Evaluation Question and Answer Test</h1>
    <form action="https://formspree.io/f/mnjgpopn" method="POST">
        <input type="hidden" name="_subject" value="Medical Evaluation Submission">
        <div class="question">
            <label for="email">Your Email (required for submission):</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="question">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age">
        </div>
        <div class="question">
            <label for="gender">Gender:</label>
            <select id="gender" name="gender">
                <option value="">Select</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="question">
            <label for="symptom">Question 1: What is your symptom?</label>
            <input type="text" id="symptom" name="symptom" required>
        </div>
        <div class="question">
            <label for="severity">Question 2: How severe is it? (Describe)</label>
            <textarea id="severity" name="severity" rows="4" required></textarea>
        </div>
        <div class="question">
            <label for="time">Question 3: How long has it lasted? </label>
            <textarea id="time" name="time" rows="4" required></textarea>
        </div>
        <div class="question">
            <label>Question 4: How would you rate your overall health?</label><br>
            <input type="radio" id="excellent" name="health_rating" value="Excellent"> Excellent<br>
            <input type="radio" id="good" name="health_rating" value="Good"> Good<br>
            <input type="radio" id="fair" name="health_rating" value="Fair"> Fair<br>
            <input type="radio" id="poor" name="health_rating" value="Poor"> Poor<br>
        </div>
        
        <p><strong>Note:</strong> answer with N/A if not applicable.</p>
        <div class="question">
            <label for="medical_history">Medical history FRQ - provide any past medical conditions, surgeries, allergies, and chronic diseases.</label>
            <textarea id="medical_history" name="medical_history" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="medications">Provide primary care provider with a complete list of medications and supplements you are currently taking.</label>
            <textarea id="medications" name="medications" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="dietary">Provide any specific dietary restrictions or modifications such as diabetes.</label>
            <textarea id="dietary" name="dietary" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="family_history">Family History: List any significant medical conditions in your immediate family (parents, siblings, children), including ages of onset if known.</label>
            <textarea id="family_history" name="family_history" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="social_history">Social History: Describe your smoking history, alcohol use, exercise habits, and any other lifestyle factors.</label>
            <textarea id="social_history" name="social_history" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="allergies">Allergies: List any allergies to medications, foods, or environmental factors, including reactions.</label>
            <textarea id="allergies" name="allergies" rows="4"></textarea>
        </div>
        <div class="question">
            <label for="review_systems">Review of Systems: Describe any symptoms or issues with the following systems (answer N/A if none): Constitutional, Eyes, Ears, Nose/Sinuses, Throat/Mouth, Cardiovascular, Respiratory, Gastrointestinal, Genitourinary, Musculoskeletal, Skin, Neurological, Psychiatric, Endocrine.</label>
            <textarea id="review_systems" name="review_systems" rows="6"></textarea>
        </div>
        <div class="question">
            <label for="emergency_contact">Emergency Contact: Name, relationship, phone number.</label>
            <textarea id="emergency_contact" name="emergency_contact" rows="2"></textarea>
        </div>
        
        <button type="submit">Submit Test</button>
    </form>

    </div>
</body>
</html></content>
